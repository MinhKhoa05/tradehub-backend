version: "3.9"

services:
  api:
    build:
      context: .
    container_name: tradehub_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=server=db;port=3306;database=tradehub_db;user=root;password=123456
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: tradehub_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: tradehub_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./Database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
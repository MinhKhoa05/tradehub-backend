version: "3.9"

services:
  api:
    build:
      context: .
    container_name: tradehub_api
    ports:
      - "5000:8080" # Gọi từ ngoài qua port 5000
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Map chính xác vào GetConnectionString("Default")
      - ConnectionStrings__Default=server=db;port=3306;database=tradehub_db;user=root;password=123456
      # Truyền URL của React vào để config CORS linh hoạt
      - AllowedOrigins=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: tradehub_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: tradehub_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./Database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data: